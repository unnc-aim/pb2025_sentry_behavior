pb2025_sentry_behavior_server:
  ros__parameters:
    use_sim_time: false
    action_name: pb2025_sentry_behavior
    tick_frequency: 5
    groot2_port: 0
    ros_plugins_timeout: 5000
    use_cout_logger: false

    plugins:
      - pb2025_sentry_behavior/bt_plugins

    behavior_trees:
      - pb2025_sentry_behavior/behavior_trees

    CalculateAttackPose:
      attack_radius: 2.0
      num_sectors: 36
      cost_threshold: 50
      robot_base_frame: chassis
      visualize: true

pb2025_sentry_behavior_client:
  ros__parameters:
    use_sim_time: false
    target_tree: mobility_test
